<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <link rel="stylesheet" href="style.css">
    <title>Sacola | Aura Feminina</title>
</head>

<body class="cart">

    <header class="cart-header">
        <div class="cart-logo">
            <h1><span class="cart-aura">Aura</span> Feminina</h1>
        </div>

        <nav class="cart-nav">
            <ul class="cart-menu">
                <li>
                    <a href="index.html" class="cart-btn-home">
                        <img src="../../img-aura/aura.png" alt="voltar" class="cart-img-home">
                    </a>
                </li>
            </ul>
        </nav>
    </header>

    <!-- BANNER -->
    <div class="cart-banner">
        <img src="../../img-aura/carrinho.png" alt="banner" class="cart-banner-img">
    </div>

    <main class="cart-container">

        <!-- PRODUTOS -->
        <section class="cart-produtos">
            <h2 class="cart-titulo">Minha Sacola</h2>
            <div id="itens-carrinho" class="cart-itens"></div>
        </section>

        <!-- RESUMO -->
        <aside class="cart-resumo">
            <h2 class="cart-titulo">Checkout</h2>
            <h3 class="cart-subtitulo">Resumo do pedido:</h3>

            <div class="cart-linha">
                <span>Total</span>
                <strong>R$ <span id="total">0.00</span></strong>
            </div>

            <button  onclick="finalizarCompra()" class="cart-btn cart-btn-principal">
                Finalizar no Whatsapp
            </button>

            <button onclick="limparCarrinho()" class="cart-btn cart-btn-secundario">
                Limpar Sacola
            </button>

        </aside>

    </main>

    <footer class="cart-footer">
        <p class="cart-copy">© 2026 Aura Feminina</p>
        <p class="cart-dev">Desenvolvido por <a href="#">WS Desenvolvimento</a></p>
    </footer>

    <script src="script.js"></script>
    <div id="toast" class="toast"></div>
</body>

</html>
